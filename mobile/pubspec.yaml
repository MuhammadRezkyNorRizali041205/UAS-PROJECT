name: smart_campus_mobile
description: Smart Campus Assistant - Flutter Mobile App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^3.0.0
  riverpod_annotation: ^4.0.0

  # Navigation
  go_router: ^13.2.0

  # HTTP
  dio: ^5.4.3+1
  pretty_dio_logger: ^1.3.1

  # Secure storage
  flutter_secure_storage: ^9.0.0

  # UI
  cupertino_icons: ^1.0.6
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  lottie: ^3.1.0
  cached_network_image: ^3.3.1
  image_picker: ^1.1.1

  # Calendar & Charts
  table_calendar: ^3.1.1
  fl_chart: ^0.67.0

  # QR
  mobile_scanner: ^5.1.0
  qr_flutter: ^4.1.0

  # Notifications
  flutter_local_notifications: ^17.2.1+1
  firebase_messaging: ^15.1.0
  firebase_core: ^3.3.0

  # Utilities
  intl: 0.20.2
  uuid: ^4.4.0
  share_plus: ^9.0.0
  url_launcher: ^6.3.0
  permission_handler: ^11.3.1
  connectivity_plus: ^6.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^4.0.0
  json_serializable: ^6.8.0
  freezed: ^3.0.0
  freezed_annotation: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
