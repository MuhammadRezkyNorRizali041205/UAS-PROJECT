version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: smart_campus_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    environment:
      - APP_ENV=${APP_ENV:-local}
    networks:
      - smart_campus_network
    depends_on:
      - postgres
      - redis

  nginx:
    image: nginx:1.25-alpine
    container_name: smart_campus_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
      - "8443:443"
    volumes:
      - .:/var/www
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - smart_campus_network
    depends_on:
      - app

  postgres:
    image: postgres:16-alpine
    container_name: smart_campus_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: smart_campus
      POSTGRES_USER: smart_campus_user
      POSTGRES_PASSWORD: secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - smart_campus_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smart_campus_user -d smart_campus"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: smart_campus_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - smart_campus_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: smart_campus_queue
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    command: php artisan queue:work redis --sleep=3 --tries=3 --max-time=3600
    networks:
      - smart_campus_network
    depends_on:
      - postgres
      - redis

  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: smart_campus_scheduler
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    command: sh -c "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"
    networks:
      - smart_campus_network
    depends_on:
      - postgres
      - redis

  mailhog:
    image: mailhog/mailhog:latest
    container_name: smart_campus_mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - smart_campus_network

volumes:
  postgres_data:
  redis_data:

networks:
  smart_campus_network:
    driver: bridge
